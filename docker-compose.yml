version: '3.8'

services:
  mongodb:
    image: mongo:6-jammy
    container_name: snipshare-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  api-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: snipshare-server
    restart: unless-stopped
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
      - MONGO_URI=mongodb://mongodb:27017/snipshare
      - JWT_SECRET=change_me_in_production
      - CLIENT_ORIGIN=http://localhost:8080
    depends_on:
      - mongodb

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: snipshare-client
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api-server

volumes:
  mongodb_data:
