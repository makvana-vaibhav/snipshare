name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  checkout:
    name: Checkout Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

  build:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare CI env file for compose validation
        run: |
          if [ -f .env.deploy.example ]; then
            cp .env.deploy.example .env.deploy
          else
            touch .env.deploy
          fi

      - name: Validate deploy compose file
        run: docker compose -f docker-compose.deploy.yml config

  test:
    name: Run Basic Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Dummy test (replace with real tests later)
        run: echo "Tests passed"

  push-image:
    name: Build & Prepare Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Skip push step
        run: echo "Skipping image push (build happens on EC2)"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: push-image
    steps:
      - name: Validate required secrets
        run: |
          [ -n "${{ secrets.EC2_HOST }}" ] || (echo "EC2_HOST missing" && exit 1)
          [ -n "${{ secrets.EC2_USER }}" ] || (echo "EC2_USER missing" && exit 1)
          [ -n "${{ secrets.EC2_SSH_KEY }}" ] || (echo "EC2_SSH_KEY missing" && exit 1)
          [ -n "${{ secrets.APP_DIR }}" ] || (echo "APP_DIR missing" && exit 1)

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          port: ${{ secrets.EC2_PORT }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.APP_DIR }}
            git fetch origin main
            git reset --hard origin/main

            docker compose -f docker-compose.deploy.yml --env-file .env.deploy up -d --build --remove-orphans
            docker image prune -f