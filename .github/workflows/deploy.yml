name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:

  checkout:
    name: Checkout Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t snipshare-app .

  test:
    name: Run Basic Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Dummy test (can replace later)
        run: echo "Tests passed"

  push-image:
    name: Push Image (Optional)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Skip push (placeholder)
        run: echo "Skipping Docker Hub push"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: push-image

    steps:
      - name: Validate required secrets
        run: |
          [ -n "${{ secrets.EC2_HOST }}" ] || (echo "EC2_HOST missing" && exit 1)
          [ -n "${{ secrets.EC2_USER }}" ] || (echo "EC2_USER missing" && exit 1)
          [ -n "${{ secrets.EC2_SSH_KEY }}" ] || (echo "EC2_SSH_KEY missing" && exit 1)
          [ -n "${{ secrets.APP_DIR }}" ] || (echo "APP_DIR missing" && exit 1)

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          port: ${{ secrets.EC2_PORT }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.APP_DIR }}
            git fetch origin main
            git reset --hard origin/main

            docker compose -f docker-compose.deploy.yml --env-file .env.deploy up -d --build --remove-orphans
            docker image prune -f