services:
  api-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: snipshare-server
    restart: always
    env_file:
      - .env.deploy
    environment:
      PORT: ${PORT:-5005}
      NODE_ENV: production
    ports:
      - "5005:5005"
    expose:
      - "5005"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5005/api/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - snipshare-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: snipshare-client
    restart: always
    ports:
      - "80:80"
    depends_on:
      api-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 10s
    networks:
      - snipshare-net

networks:
  snipshare-net:
    name: snipshare-net
